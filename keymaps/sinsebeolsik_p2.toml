    [0x116E, 0x1175, 0x1171],   # ㅜ + ㅣ = ㅟ
    [0x1173, 0x1175, 0x1174],   # ㅡ + ㅣ = ㅢ
    [0x119E, 0x1175, 0x11A1],   # ㆍ + ㅣ = ㆎ
    [0x119E, 0x119E, 0x11A2],   # ㆍ + ㆍ = ᆢ (쌍아래아)

    # Jongseong compounds (12)
    [0x11A8, 0x11A8, 0x11A9],   # ㄱ받침 + ㄱ받침 = ㄲ받침
    [0x11A8, 0x11BA, 0x11AA],   # ㄱ받침 + ㅅ받침 = ㄳ
    [0x11AB, 0x11BD, 0x11AC],   # ㄴ받침 + ㅈ받침 = ㄵ
