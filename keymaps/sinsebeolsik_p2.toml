# from gitlab.com/3beol/3beol.gitlab.io @ master, == ohi.pat.im live.
#
# See docs/automaton.md §5 for the format spec.
#
# NOTE on TOML structure: `base_keymap = [...]` is a top-level key, so it
# must precede every `[section]` header below. Once we enter `[meta]`,
# every subsequent bare key becomes `meta.<key>` until the next header.

# ---------------------------------------------------------------------------
# Base keymap. Each entry: [ascii_code, output_codepoint].
# `output = 0` means the key is not claimed (passthrough).
# ASCII range 0x21..0x7E (94 keys total). Order is by ASCII code.
# ---------------------------------------------------------------------------
base_keymap = [
    [0x21, 0x21],     # ! → !
    [0x22, 0x2F],     # " → / (P2 idiom: shift+' is /)
    [0x23, 0x23],     # # → #
