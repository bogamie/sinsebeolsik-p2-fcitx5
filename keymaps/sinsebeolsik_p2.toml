[meta]
name             = "Sinsebeolsik P2"
layout_revision  = "2016-08-06"
symbol_revision  = "2018-04-10"
scope            = "basic-p2"      # base layout only; toggles below for extensions
spec_url         = "http://pat.im/1136"
base_layout      = "qwerty"


# ---------------------------------------------------------------------------
# 갈마들이 (alternation). `from → to` rewrite consulted by Layer 1 of the
# automaton (docs/automaton.md §3.3).
# ---------------------------------------------------------------------------

[galmadeuli]

# 4 entries. Cho → jung — the post-cho alternation that lets i/o//(slash)/p
# act as compound-vowel virtual units. NO inverse generated (would shadow
# the bidirectional jung↔jong below; e.g., inverting ㅡ→ㅁ초성 collides
# with the established ㅡ↔ㄷ받침 pair).
one_way = [
    [0x1106, 0x1173],   # ㅁ초성 → ㅡ
    [0x110E, 0x116E],   # ㅊ초성 → ㅜ
    [0x110F, 0x1169],   # ㅋ초성 → ㅗ
    [0x1111, 0x119E],   # ㅍ초성 → ㆍ
]

# 15 entries. Jung ↔ jong — the loader auto-generates the inverse for
# 30 directed lookups total. Covers every modern jong consonant + ㆍ.
bidirectional = [
    [0x1161, 0x11C1],   # ㅏ ↔ ㅍ받침
    [0x1162, 0x11B8],   # ㅐ ↔ ㅂ받침
    [0x1163, 0x11AF],   # ㅑ ↔ ㄹ받침
    [0x1164, 0x11BA],   # ㅒ ↔ ㅅ받침
    [0x1165, 0x11C0],   # ㅓ ↔ ㅌ받침
    [0x1166, 0x11A8],   # ㅔ ↔ ㄱ받침
    [0x1167, 0x11BF],   # ㅕ ↔ ㅋ받침
    [0x1168, 0x11AB],   # ㅖ ↔ ㄴ받침
    [0x1169, 0x11BD],   # ㅗ ↔ ㅈ받침
    [0x116D, 0x11BB],   # ㅛ ↔ ㅆ받침
    [0x116E, 0x11BE],   # ㅜ ↔ ㅊ받침
    [0x1172, 0x11BC],   # ㅠ ↔ ㅇ받침
    [0x1173, 0x11AE],   # ㅡ ↔ ㄷ받침
    [0x1175, 0x11C2],   # ㅣ ↔ ㅎ받침
    [0x119E, 0x11B7],   # ㆍ ↔ ㅁ받침
]


# ---------------------------------------------------------------------------
# Compound jamo. 26 rules: 5 cho doubles + 9 jung compounds + 12 jong
# compounds. The jong_split decomposition table (docs §3.5) is auto-derived
# from the JONG entries by the loader.
# ---------------------------------------------------------------------------

[combination]
rules = [
    # Choseong doubles (5)
    [0x1100, 0x1100, 0x1101],   # ㄱ + ㄱ = ㄲ
    [0x1103, 0x1103, 0x1104],   # ㄷ + ㄷ = ㄸ
    [0x1107, 0x1107, 0x1108],   # ㅂ + ㅂ = ㅃ
    [0x1109, 0x1109, 0x110A],   # ㅅ + ㅅ = ㅆ
    [0x110C, 0x110C, 0x110D],   # ㅈ + ㅈ = ㅉ

    # Jungseong compounds (9)
    [0x1169, 0x1161, 0x116A],   # ㅗ + ㅏ = ㅘ
    [0x1169, 0x1162, 0x116B],   # ㅗ + ㅐ = ㅙ
    [0x1169, 0x1175, 0x116C],   # ㅗ + ㅣ = ㅚ
    [0x116E, 0x1165, 0x116F],   # ㅜ + ㅓ = ㅝ
